name: Build Redmi K40 Pro SukiSU Kernel

on:
  workflow_dispatch: # 允许你手动点击按钮开始编译

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Build Environment
      run: |
        sudo apt-get update
        sudo apt-get install -y bc build-essential libelf-dev libssl-dev flex bison ccache libncurses-dev texinfo zip
        mkdir -p $GITHUB_WORKSPACE/kernel

    - name: Download Toolchain (Clang)
      run: |
        cd $GITHUB_WORKSPACE
        # 下载官方推荐的 Proton Clang 编译器
        git clone https://github.com/kdrag0n/proton-clang.git --depth=1 clang

    - name: Download Kernel Source
      run: |
        cd $GITHUB_WORKSPACE/kernel
        # 拉取经过社区修复、支持较新安卓版本的 K40Pro 骁龙888内核源码
        git clone https://github.com/LineageOS/android_kernel_xiaomi_sm8350.git -b lineage-21 --depth=1 .

    - name: Integrate SukiSU-Ultra & Customize Name
      run: |
        cd $GITHUB_WORKSPACE/kernel
        
        # 1. 注入 SukiSU-Ultra 源码
        git clone https://github.com/SukiSU-Ultra/SukiSU-Ultra.git drivers/kernelsu
        echo "obj-y += kernelsu/" >> drivers/Makefile
        
        # 2. 自动寻找红米 K40 Pro (haydn) 的配置文件并改名
        DEFCONFIG_FILE=$(find arch/arm64/configs/ -name "*haydn*" | head -n 1)
        if [ -z "$DEFCONFIG_FILE" ]; then
          DEFCONFIG_FILE=$(find vendor/ -name "*haydn*" | head -n 1)
        fi
        
        echo "找到的配置文件路径是: $DEFCONFIG_FILE"
        
        # 【重点】这里已经换上了你专属的霸气内核名字！
        sed -i 's/CONFIG_LOCALVERSION=.*/CONFIG_LOCALVERSION="-SUkiSU-Ultra-K40Pro-By-🐾白墨🐾Whiteink🐾"/g' $DEFCONFIG_FILE
        
        # 3. 注入 SukiSU 必须的内核配置项
        echo "CONFIG_KALLSYMS=y" >> $DEFCONFIG_FILE
        echo "CONFIG_KALLSYMS_ALL=y" >> $DEFCONFIG_FILE
        
        # 把找到的文件名存起来给下一步用
        echo "DEFCONFIG_NAME=$(basename $DEFCONFIG_FILE)" >> $GITHUB_ENV

    - name: Start Compilation
      run: |
        cd $GITHUB_WORKSPACE/kernel
        export PATH="$GITHUB_WORKSPACE/clang/bin:$PATH"
        export ARCH=arm64
        export SUBARCH=arm64
        export CROSS_COMPILE=aarch64-linux-gnu-
        export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
        
        # 开始编译，自动使用上一步找到的配置文件名
        make O=out $DEFCONFIG_NAME
        make -j$(nproc --all) O=out CC=clang

    - name: Pack with AnyKernel3
      run: |
        cd $GITHUB_WORKSPACE
        git clone https://github.com/osm0sis/AnyKernel3.git AnyKernel3
        # 适配 K40Pro 的代号 haydn
        sed -i 's/device.name1=.*/device.name1=haydn/g' AnyKernel3/anykernel.sh
        # 把编译好的 Image 复制并重命名放到打包目录中
        cp kernel/out/arch/arm64/boot/Image AnyKernel3/
        cd AnyKernel3
        zip -r9 ../SukiSU-Kernel-K40P.zip *

    - name: Upload Kernel Zip
      uses: actions/upload-artifact@v4
      with:
        name: SukiSU-Ultra-Kernel-RedmiK40Pro
        path: SukiSU-Kernel-K40P.zip
