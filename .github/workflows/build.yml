name: Build Redmi K40 Pro SukiSU Kernel

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Build Environment
      run: |
        sudo apt-get update
        sudo apt-get install -y bc build-essential libelf-dev libssl-dev flex bison ccache libncurses-dev texinfo zip lld llvm
        mkdir -p $GITHUB_WORKSPACE/kernel
        mkdir -p $GITHUB_WORKSPACE/tmp
        mkdir -p $GITHUB_WORKSPACE/pack

    - name: Download Reliable Lightweight Clang
      run: |
        cd $GITHUB_WORKSPACE
        git clone https://github.com/Panchajanya1999/azure-clang.git --depth=1 clang

    - name: Download Kernel Source
      run: |
        cd $GITHUB_WORKSPACE/kernel
        git clone https://github.com/LineageOS/android_kernel_xiaomi_sm8350.git -b lineage-21 --depth=1 .

    - name: Integrate SukiSU-Ultra & Customize Name
      run: |
        cd $GITHUB_WORKSPACE/tmp
        git clone https://github.com/SukiSU-Ultra/SukiSU-Ultra.git kernelsu_source
        
        cd $GITHUB_WORKSPACE/kernel
        rm -rf drivers/kernelsu
        if [ -d "$GITHUB_WORKSPACE/tmp/kernelsu_source/kernel" ]; then
          mv $GITHUB_WORKSPACE/tmp/kernelsu_source/kernel drivers/kernelsu
        elif [ -d "$GITHUB_WORKSPACE/tmp/kernelsu_source/ksu" ]; then
          mv $GITHUB_WORKSPACE/tmp/kernelsu_source/ksu drivers/kernelsu
        else
          mv $GITHUB_WORKSPACE/tmp/kernelsu_source drivers/kernelsu
        fi
        rm -rf drivers/kernelsu/.git
        
        rm -rf techpack/datarmnet
        rm -rf techpack/datarmnet-ext
        
        sed -i '/kernelsu/d' drivers/Makefile
        echo "obj-y += kernelsu/" >> drivers/Makefile
        
        REAL_DEFCONFIG=$(find arch/arm64/configs/ -name "*haydn*" | head -n 1)
        if [ -z "$REAL_DEFCONFIG" ]; then
          REAL_DEFCONFIG=$(find vendor/ -name "*haydn*" | head -n 1)
        fi
        cp $REAL_DEFCONFIG arch/arm64/configs/haydn_defconfig
        
        # 【专属名字注入】内核层面的专属尾巴！
        sed -i 's/CONFIG_LOCALVERSION=.*/CONFIG_LOCALVERSION="-SUkiSU-Ultra-K40Pro-By-Whiteink"/g' arch/arm64/configs/haydn_defconfig
        echo "CONFIG_KALLSYMS=y" >> arch/arm64/configs/haydn_defconfig
        echo "CONFIG_KALLSYMS_ALL=y" >> arch/arm64/configs/haydn_defconfig

    - name: Start Compilation
      run: |
        cd $GITHUB_WORKSPACE/kernel
        export PATH="$GITHUB_WORKSPACE/clang/bin:$PATH"
        export ARCH=arm64
        export SUBARCH=arm64
        
        make haydn_defconfig
        make olddefconfig
        
        make -j$(nproc --all) \
          CC=clang \
          CLANG_TRIPLE=aarch64-linux-gnu- \
          CROSS_COMPILE=aarch64-linux-gnu- \
          CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
          LD=ld.lld \
          AR=llvm-ar \
          NM=llvm-nm \
          OBJCOPY=llvm-objcopy \
          OBJDUMP=llvm-objdump \
          STRIP=llvm-strip

    - name: Download and Use AGNi Framework
      run: |
        cd $GITHUB_WORKSPACE/pack
        # 下载适配 K40 Pro 的标准框架
        git clone https://github.com/Krypton-Project/AnyKernel3.git -b haydn --depth=1 framework
        
        # 将我们编译出来的 Image 镜像无缝替换进去
        cp $GITHUB_WORKSPACE/kernel/arch/arm64/boot/Image $GITHUB_WORKSPACE/pack/framework/Image
        
        # 【终极修正】强行把人家的打包脚本里的展示名字，改成你专属的霸气名字！
        sed -i 's/kernel.string=.*/kernel.string=SukiSU-Ultra Kernel By Whiteink/g' $GITHUB_WORKSPACE/pack/framework/anykernel.sh
        
        # 重新打包
        cd $GITHUB_WORKSPACE/pack/framework
        zip -r9 SukiSU-Kernel-K40P.zip ./*

    - name: Upload Kernel Zip
      uses: actions/upload-artifact@v4
      with:
        name: SukiSU-Ultra-Kernel-RedmiK40Pro
        path: pack/framework/SukiSU-Kernel-K40P.zip
